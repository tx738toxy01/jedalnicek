<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Môj Inteligentný Jedálniček</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%22 y=%2250%22 font-size=%2280%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>🍽️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23f97316%22/><text x=%2250%22 y=%2250%22 font-size=%2265%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>🍽️</text></svg>">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Jedálniček">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #f97316; 
            --primary-light: #ffedd5; 
            --secondary: #84cc16; 
            --secondary-light: #ecfccb;
            --blue-light: #e0f2fe;
            --blue-main: #0284c7;
            --yellow-light: #fef08a;
            --yellow-main: #ca8a04;
            --bg: #fdf5e6; 
            --surface: #fffefc; 
            --text-main: #292524; 
            --text-muted: #78716c; 
            --border: #e7e5e4; 
            
            --shadow-card: 0 4px 15px rgba(67, 40, 16, 0.05);
            --shadow-hover: 0 10px 25px rgba(67, 40, 16, 0.09);
            --shadow-modal: 0 25px 50px -12px rgba(67, 40, 16, 0.15);
            --radius-sm: 12px;
            --radius-lg: 24px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding: 40px 20px; line-height: 1.6; padding-bottom: 120px;}
        
        .header-container { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.03em; margin-bottom: 8px;}
        
        .global-actions { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px; }
        .btn-global { padding: 12px 24px; border-radius: 25px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); background: white; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: var(--shadow-card); max-width: 450px; width: 100%;}
        .btn-global:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
        .btn-global.btn-highlight { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
        .btn-global.btn-highlight:hover { background: var(--primary); color: white; }

        .legend-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; margin-top: 10px; }
        .legend-input-group {
            display: inline-flex; align-items: center; background: var(--secondary-light); padding: 8px 16px;
            border-radius: 20px; border: 1px dashed transparent; box-shadow: var(--shadow-card);
            font-size: 0.95rem; font-weight: 600; color: #4d7c0f; gap: 5px; transition: 0.2s;
        }
        .legend-input-group:focus-within { background: var(--primary-light); color: var(--primary); border-color: var(--primary); transform: translateY(-2px); }
        .legend-input {
            border: none; background: transparent; width: 60px; font-weight: 700; font-family: inherit;
            color: inherit; text-align: center; outline: none; -moz-appearance: textfield;
            font-size: 1.05rem; border-bottom: 2px dashed rgba(77, 124, 15, 0.4); transition: 0.2s; cursor: pointer;
        }
        .legend-input::-webkit-outer-spin-button, .legend-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .legend-input-group:focus-within .legend-input { border-bottom-color: var(--primary); cursor: text;}
        
        .schedule-container { max-width: 1450px; margin: 0 auto; overflow-x: auto; padding-bottom: 20px;}
        .grid-table { display: grid; grid-template-columns: 100px repeat(5, minmax(210px, 1fr)) minmax(250px, 1fr); gap: 15px; min-width: 1300px; }
        
        .col-header { font-weight: 600; text-transform: uppercase; font-size: 0.8rem; color: var(--text-muted); text-align: left; padding: 0 10px 10px; border-bottom: 2px solid var(--border); margin-bottom: 10px;}
        .col-header.empty { border: none; }
        .col-header.summary { color: var(--primary); border-bottom-color: var(--primary-light); }
        
        .day-label-box { display: flex; flex-direction: column; justify-content: center; gap: 8px; }
        .day-label { font-weight: 700; color: var(--text-main); font-size: 1.1rem; }
        .day-action-icons { display: flex; gap: 6px; }
        .icon-btn-small { background: white; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.85rem; transition: 0.2s; box-shadow: var(--shadow-card); color: var(--text-main); }
        .icon-btn-small:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.05); }

        .meal-cell { background: var(--surface); border-radius: var(--radius-sm); padding: 16px; padding-bottom: 48px; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow-card); border: 1px solid rgba(231, 229, 228, 0.6); display: flex; flex-direction: column; justify-content: flex-start; min-height: 130px; position: relative;}
        .meal-cell:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--primary-light); }
        .meal-cell-top { width: 100%; }
        .meal-cell-title { font-weight: 600; font-size: 0.95rem; color: var(--text-main); margin-bottom: 4px; line-height: 1.3;}
        .meal-cell-macros { font-size: 0.75rem; color: var(--text-muted); }
        
        .meal-cell-actions { position: absolute; bottom: 12px; right: 12px; display: flex; gap: 4px; opacity: 0.3; transition: 0.2s; z-index: 2;}
        .meal-cell:hover .meal-cell-actions { opacity: 1; }

        .summary-cell { background: linear-gradient(145deg, #fff7ed, #fffefc); border: 2px dashed var(--primary-light); border-radius: var(--radius-sm); padding: 16px; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow-card); }
        .summary-cell:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); background: #ffedd5; border-color: var(--primary); }
        .summary-title { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid var(--primary-light); padding-bottom: 5px;}
        
        .macro-progress-text { position: relative; display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 6px; padding: 4px 8px; border-radius: 6px; background: #f5f5f4; overflow: hidden; z-index: 1; }
        .mpt-fill { position: absolute; top: 0; left: 0; height: 100%; z-index: -1; transition: width 0.5s ease; }
        .mpt-label { font-weight: 600; color: var(--text-main); }
        .mpt-value { font-weight: 500; color: var(--text-main); }
        
        .meal-eaten { background-color: #dcfce7 !important; border-color: #bbf7d0 !important; }
        .meal-skipped { background-color: #fee2e2 !important; border-color: #fecaca !important; opacity: 0.7; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(41, 37, 36, 0.6); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s ease; z-index: 1000; padding: 20px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--surface); width: 100%; max-width: 600px; border-radius: var(--radius-lg); padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-modal); transform: scale(0.95) translateY(10px); transition: 0.3s ease; }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        
        .close-btn { position: absolute; top: 20px; right: 20px; background: #f5f5f4; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 22px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .close-btn:hover { background: #e7e5e4; color: var(--text-main); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 25px; min-height: 50px; padding-right: 40px; }
        .modal-header h2 { font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin: 0; line-height: 1.2; flex: 1; }
        .modal-header-actions { display: flex; align-items: center; gap: 10px; margin-left: 20px; }
        
        .macros { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .macro-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .bg-cal { background: var(--primary-light); color: #c2410c; }
        .bg-pro { background: var(--secondary-light); color: #4d7c0f; }
        .bg-carb { background: var(--blue-light); color: var(--blue-main); }
        .bg-fat { background: var(--yellow-light); color: var(--yellow-main); }
        .bg-fib { background: #f5f5f4; color: #57534e; }
        
        .action-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn-status { flex: 1; padding: 12px; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.95rem; min-width: 140px;}
        .btn-eaten { background: #f5f5f4; color: #16a34a; }
        .btn-eaten.active { background: #16a34a; color: white; box-shadow: 0 4px 10px rgba(22, 163, 74, 0.2); }
        .btn-skipped { background: #f5f5f4; color: #ef4444; }
        .btn-skipped.active { background: #ef4444; color: white; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); }
        
        h3 { font-size: 1.1rem; font-weight: 600; margin: 30px 0 15px; color: var(--text-main); display: flex; justify-content: space-between; align-items: center;}
        
        ul.ingredients { list-style: none; margin-bottom: 20px;}
        ul.ingredients li { display: flex; align-items: flex-start; gap: 15px; padding: 12px 0; border-bottom: 1px solid #f5f5f4; }
        
        .checkbox-wrapper { display: flex; align-items: flex-start; cursor: pointer; width: 100%;}
        .checkbox-wrapper input[type="checkbox"] { display: none; }
        .checkmark { width: 22px; height: 22px; border: 2px solid #d6d3d1; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; margin-top: 2px; margin-right: 15px;}
        .checkbox-wrapper input[type="checkbox"]:checked + .checkmark { background-color: var(--primary); border-color: var(--primary); }
        .checkbox-wrapper input[type="checkbox"]:checked + .checkmark::after { content: "✓"; color: white; font-size: 13px; font-weight: bold; }
        
        .ingredient-info { flex: 1; transition: 0.2s; }
        .ingredient-text { color: var(--text-main); font-weight: 500; font-size: 0.95rem; display: block; line-height: 1.3;}
        .ingredient-macro-detail { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; display: block;}
        .ingredient-info.purchased { opacity: 0.5; text-decoration: line-through; }
        
        .custom-food-container { background: #fafaf9; border: 1px dashed #d6d3d1; border-radius: var(--radius-sm); padding: 20px; margin-top: 20px; }
        .cf-title { font-size: 0.95rem; font-weight: 600; color: var(--text-main); margin-bottom: 15px;}
        .cf-input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;}
        .cf-input { padding: 12px; border: 1px solid #d6d3d1; border-radius: 8px; font-size: 0.95rem; outline: none; width: 100%; background: white; transition: 0.2s;}
        .cf-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .cf-macro-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .cf-macro-input { text-align: center; padding: 10px; font-size: 0.85rem;}
        .btn-add-custom { background: var(--text-main); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%;}
        .btn-add-custom:hover { background: #000; }

        p.steps { font-size: 0.95rem; color: var(--text-main); white-space: pre-line; line-height: 1.8; background: #fafaf9; padding: 25px; border-radius: var(--radius-sm); border-left: 4px solid var(--secondary); margin-top: 10px;}
        
        .summary-chart-container { background: #fafaf9; padding: 25px; border-radius: var(--radius-sm); margin-bottom: 20px; border: 1px solid var(--border);}
        .big-progress-row { margin-bottom: 15px; }
        .big-progress-row:last-child { margin-bottom: 0; }
        .bp-header { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; }
        .bp-val { color: var(--text-muted); font-size: 0.8rem; font-weight: 500;}
        .bp-bar { width: 100%; height: 10px; background: #e7e5e4; border-radius: 5px; overflow: hidden; }
        .bp-fill { height: 100%; border-radius: 5px; transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .floating-cart { position: fixed; bottom: 30px; right: 30px; background: var(--surface); color: var(--text-main); padding: 16px 24px; border-radius: 50px; font-weight: 600; cursor: pointer; box-shadow: 0 10px 25px rgba(67, 40, 16, 0.1); z-index: 900; border: 1px solid var(--border); font-size: 1rem; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .floating-cart:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(67, 40, 16, 0.15); border-color: var(--primary-light); }
        .cart-badge { background: var(--primary); color: white; border-radius: 50%; min-width: 28px; height: 28px; padding: 0 8px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        
        .cart-items-container { background: #fafaf9; padding: 15px; border-radius: var(--radius-sm); margin-bottom: 25px; max-height: 50vh; overflow-y: auto;}
        .empty-cart-msg { text-align: center; color: var(--text-muted); padding: 30px 10px; font-style: italic; }
        
        .btn-danger { width: 100%; padding: 12px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: 0.2s; background: white; color: #ef4444; border: 1px solid #fca5a5; }
        .btn-danger:hover { background: #fef2f2; }
        
        .select-sort { padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-family: inherit; font-size: 0.85rem; outline: none; cursor: pointer; background: white; color: var(--text-main); font-weight: 500;}

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }

        @media (max-width: 900px) {
            .schedule-container { padding: 0; }
            .grid-table { display: flex; flex-direction: column; min-width: auto; }
            .col-header { display: none; }
            .day-label-box {
                flex-direction: row; justify-content: space-between; align-items: center;
                background: var(--surface); padding: 15px; border-radius: var(--radius-sm);
                margin-top: 20px; border: 1px solid var(--border);
            }
        }
        
        /* Search result items */
        .search-result-item {
            padding: 12px 15px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            margin-bottom: 10px; cursor: pointer; transition: 0.2s; background: white;
        }
        .search-result-item:hover { border-color: var(--primary); background: var(--primary-light); transform: translateX(5px); }
        .search-result-title { font-weight: 600; font-size: 0.95rem; color: var(--text-main); }
        .search-result-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

/* Toast notifikácia v strede obrazovky */
        .toast-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(41, 37, 36, 0.9);
            color: white;
            padding: 20px 40px;
            border-radius: var(--radius-lg);
            font-size: 1.2rem;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            box-shadow: var(--shadow-modal);
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        .toast-message.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Inteligentný Jedálniček</h1>
        <h2 style="font-size: 1.1rem; color: var(--text-muted); font-weight: 500; margin-top: -5px; margin-bottom: 15px;">Môj cieľový denný príjem:</h2>
        
        <div class="legend-container">
            <div class="legend-input-group" id="group-cal" title="Zmeň cieľ Kalórií">
                🔥 <input type="number" id="goal-cal" class="legend-input" onfocus="this.select()" onkeydown="if(event.key === 'Enter') this.blur()" onchange="updateGoal('cal')"> kcal <span id="lock-cal" onclick="toggleLock('cal')" style="cursor:pointer; margin-left:6px; font-size:1.1rem; user-select:none;">🔓</span>
            </div>
            <div class="legend-input-group" id="group-pro" title="Zmeň cieľ Bielkovín">
                🥩 <input type="number" id="goal-pro" class="legend-input" onfocus="this.select()" onkeydown="if(event.key === 'Enter') this.blur()" onchange="updateGoal('pro')"> g Bielkovín <span id="lock-pro" onclick="toggleLock('pro')" style="cursor:pointer; margin-left:6px; font-size:1.1rem; user-select:none;">🔓</span>
            </div>
            <div class="legend-input-group" id="group-carb" title="Zmeň cieľ Sacharidov">
                🍞 <input type="number" id="goal-carb" class="legend-input" onfocus="this.select()" onkeydown="if(event.key === 'Enter') this.blur()" onchange="updateGoal('carb')"> g Sacharidov <span id="lock-carb" onclick="toggleLock('carb')" style="cursor:pointer; margin-left:6px; font-size:1.1rem; user-select:none;">🔓</span>
            </div>
            <div class="legend-input-group" id="group-fat" title="Zmeň cieľ Tukov">
                🥑 <input type="number" id="goal-fat" class="legend-input" onfocus="this.select()" onkeydown="if(event.key === 'Enter') this.blur()" onchange="updateGoal('fat')"> g Tukov <span id="lock-fat" onclick="toggleLock('fat')" style="cursor:pointer; margin-left:6px; font-size:1.1rem; user-select:none;">🔓</span>
            </div>
            <div class="legend-input-group" id="group-fib" title="Zmeň cieľ Vlákniny">
                🌾 <input type="number" id="goal-fib" class="legend-input" onfocus="this.select()" onkeydown="if(event.key === 'Enter') this.blur()" onchange="updateGoal('fib')"> g Vlákniny <span id="lock-fib" onclick="toggleLock('fib')" style="cursor:pointer; margin-left:6px; font-size:1.1rem; user-select:none;">🔓</span>
            </div>
        </div>
        
        <div class="global-actions" style="margin-top: 20px;">
            <button class="btn-global" onclick="generateEntireNewWeek()">🔄 Vygenerovať nový náhodný týždeň</button>
            <button class="btn-global btn-highlight" onclick="addWholeWeekToCart()">🛒 Pridať celý týždeň do košíka</button>
        </div>
    </div>

    <div class="schedule-container">
        <div class="grid-table" id="scheduleGrid"></div>
    </div>

    <button class="floating-cart" onclick="openCart()">
        🛒 Nákup <span class="cart-badge" id="cartCount">0</span>
    </button>

    <div class="modal-overlay" id="mealModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('mealModal')">✕</button>
            <div class="modal-header">
                <h2 id="mTitle">Názov jedla</h2>
            </div>
            <div class="macros" id="mMacros"></div>

            <h3 style="align-items: center;">
                Suroviny
                <button onclick="resetMealIngredients()" title="Vrátiť pôvodné suroviny" style="background: #f5f5f4; border: none; border-radius: 12px; padding: 3px 12px; font-size: 0.75rem; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: 0.2s;" onmouseover="this.style.background='#e7e5e4'; this.style.color='var(--text-main)';" onmouseout="this.style.background='#f5f5f4'; this.style.color='var(--text-muted)';">reset</button>
            </h3>
            <ul class="ingredients" id="mIngredients"></ul>
            
            <div class="custom-food-container">
                <div class="cf-title">➕ Pridať vlastnú surovinu k jedlu</div>
                <div class="cf-input-group">
                    <input type="text" id="cfName" class="cf-input" placeholder="Názov (napr. Čokoláda 50g)">
                    <div class="cf-macro-row">
                        <input type="number" id="cfCal" class="cf-input cf-macro-input" placeholder="Kcal">
                        <input type="number" id="cfPro" class="cf-input cf-macro-input" placeholder="Pro">
                        <input type="number" id="cfCarb" class="cf-input cf-macro-input" placeholder="Sac">
                        <input type="number" id="cfFat" class="cf-input cf-macro-input" placeholder="Tuk">
                        <input type="number" id="cfFib" class="cf-input cf-macro-input" placeholder="Vlák">
                    </div>
                </div>
                <button class="btn-add-custom" onclick="addCustomFood()">Pridať do jedla</button>
            </div>

            <h3 style="margin-top: 35px;">Postup prípravy</h3>
            <p class="steps" id="mSteps"></p>
        </div>
    </div>

    <div class="modal-overlay" id="searchModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('searchModal')">✕</button>
            <div class="modal-header" style="margin-bottom: 15px;">
                <h2 style="font-size: 1.3rem;">Vyhľadať konkrétne jedlo</h2>
            </div>
            <input type="text" id="searchInput" class="cf-input" placeholder="Začni písať názov (napr. Vločky) alebo surovinu (napr. tvaroh)..." onkeyup="filterMeals()" autocomplete="off">
            <div id="searchResults" style="margin-top: 20px; max-height: 450px; overflow-y: auto; padding-right: 5px;">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="summaryModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('summaryModal')">✕</button>
            <div class="modal-header" style="display:block;">

<div id="centerToast" class="toast-message"></div>

    <script>
        // Ochrana voči XSS
        function escapeHTML(str) {
            if (!str) return "";
            return str.toString().replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        // Odstránenie diakritiky pre logiku na pozadí
        function removeDiacritics(str) {
            if (!str) return "";
            return str.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        // Pamäť
        function loadStorage(key, fallback) {
            try {
                let data = localStorage.getItem(key);
                return data ? JSON.parse(data) : fallback;
            } catch (e) {
                console.warn(`Chyba pamäte pre ${key}, resetujem na základ.`);
                return fallback;
            }
        }

        const BASE_GOALS = { cal: 1700, pro: 80, carb: 180, fat: 55, fib: 30 };
        let GOALS = loadStorage('userGoals', { cal: 1700, pro: 80, carb: 180, fat: 55, fib: 30 });

        let chosenMealsTimeline = loadStorage('chosenMealsTimeline', {}); 
        let shoppingList = loadStorage('shoppingListIDs', []);
        let purchasedList = loadStorage('purchasedKeys', []);
        let mealStatuses = loadStorage('mealStatuses', {}); 
        let customFoods = loadStorage('customFoods', {});
        let userSwaps = loadStorage('userSwaps', {});

        let lockedGoals = loadStorage('lockedGoals', { cal: false, pro: false, carb: false, fat: false, fib: false });

        function toggleLock(type) {
            const MIN_VALUES = { cal: 1200, pro: 40, carb: 30, fat: 25, fib: 10 };
            let inputEl = document.getElementById(`goal-${type}`);
            let val = parseInt(inputEl.value);

            if (!lockedGoals[type]) {
                if (!val || val < MIN_VALUES[type]) {
                    showToast(`Zadaj aspoň ${MIN_VALUES[type]} pred uzamknutím 🔒`);
                    inputEl.value = MIN_VALUES[type]; 
                    return; 
                }
                lockedGoals[type] = true;
                GOALS[type] = val; 
                showToast(`Cieľ pre ${type.toUpperCase()} bol uzamknutý 🔒`);
            } else {
                lockedGoals[type] = false;
                GOALS[type] = null; 
                showToast(`Cieľ pre ${type.toUpperCase()} bol odomknutý 🔓`);
            }
            
            localStorage.setItem('lockedGoals', JSON.stringify(lockedGoals));
            localStorage.setItem('userGoals', JSON.stringify(GOALS));
            updateLockUI();
        }

        function updateLockUI() {
            const svgLocked = `
                <svg width="22" height="22" viewBox="0 0 24 24" fill="#ef4444" style="vertical-align: middle; margin-bottom: 2px; filter: drop-shadow(0 2px 4px rgba(239, 68, 68, 0.4)); transition: 0.3s;">

                </svg>`;
            
            const svgUnlocked = `
                <svg width="22" height="22" viewBox="0 0 24 24" fill="#a8a29e" style="vertical-align: middle; margin-bottom: 2px; transition: 0.3s;">
                    <path d="M19 10H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V12c0-1.1-.9-2-2-2zm-7 7c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
                    <g transform="rotate(-45, 8, 10)">
                        <path d="M8 10V7c0-2.2 1.8-4 4-4s4 1.8 4 4v3h-2V7c0-1.1-.9-2-2-2s-2 .9-2 2v3H8z"/>
                    </g>
                </svg>`;

            Object.keys(lockedGoals).forEach(type => {
                let lockEl = document.getElementById(`lock-${type}`);
                let groupEl = document.getElementById(`group-${type}`);
                let inputEl = document.getElementById(`goal-${type}`); // Zameranie sa na vstupne políčko
                
                if (lockEl && groupEl && inputEl) {
                    lockEl.innerHTML = lockedGoals[type] ? svgLocked : svgUnlocked;
                    groupEl.style.borderStyle = lockedGoals[type] ? "solid" : "dashed";
                    groupEl.style.borderColor = lockedGoals[type] ? "var(--primary)" : "transparent";
                    
                    // TU JE ZMENA: Ak odomkneš, číslo zmizne. Ak zamkneš, číslo sa vráti.
                    if (!lockedGoals[type]) {
                        inputEl.value = "";
                    } else {
                        inputEl.value = GOALS[type];
                    }
                }
            });
        }

        let currentMealPlan = {}; 
        let pools = { 0:[], 1:[], 2:[], 3:[], 4:[] }; 
        
        let currentSearchDay = 1;
        let currentSearchMIdx = 0;

let pinnedDay = loadStorage('pinnedDay', null);
        let toastTimeout;

        function showToast(message) {
            const toast = document.getElementById("centerToast");
            toast.innerText = message;
            toast.classList.add("show");
            
            clearTimeout(toastTimeout);

                toast.classList.remove("show");

        function togglePinDay(day, isChecked) {

            if (isChecked) {

            }
            localStorage.setItem('pinnedDay', JSON.stringify(pinnedDay));
            
            renderGrid();

        }

        // DB Nahrad
        const SWAP_DB = {

                { n: 'Maliny', c: 52, p: 1.2, s: 12, t: 0.6, v: 6.5 }, { n: 'Figy', c: 74, p: 0.8, s: 19, t: 0.3, v: 2.9 }

                { n: 'Mrkva', c: 41, p: 0.9, s: 10, t: 0.2, v: 2.8 }, { n: 'Cuketa', c: 17, p: 1.2, s: 3, t: 0.3, v: 1 },
                { n: 'Paradajky', c: 18, p: 0.9, s: 4, t: 0.2, v: 1.2 }, { n: 'Uhorka', c: 15, p: 0.7, s: 4, t: 0.1, v: 0.5 }

            ],

            ],

                { n: 'Ryža', c: 350, p: 7, s: 78, t: 0.5, v: 1.3 }, { n: 'Zemiaky', c: 77, p: 2, s: 17, t: 0.1, v: 2.2 },
                { n: 'Cestoviny', c: 350, p: 12, s: 71, t: 1.5, v: 3 }, { n: 'Bataty', c: 86, p: 1.6, s: 20, t: 0.1, v: 3 },
                { n: 'Kuskus', c: 376, p: 13, s: 77, t: 0.6, v: 5 }, { n: 'Bulgur', c: 342, p: 12, s: 76, t: 1.3, v: 18 }
            ],

            ],
            'orechy': [
                { n: 'Vlašské orechy', c: 654, p: 15, s: 14, t: 65, v: 7 }, { n: 'Mandle', c: 579, p: 21, s: 22, t: 50, v: 12 },
                { n: 'Kešu', c: 553, p: 18, s: 30, t: 44, v: 3.3 }, { n: 'Lieskovce', c: 628, p: 15, s: 17, t: 61, v: 10 }
            ],
            'mliecne_huste': [
                { n: 'Odtučnený tvaroh', c: 68, p: 12, s: 4, t: 0.5, v: 0 }, { n: 'Grécky jogurt 0%', c: 57, p: 10, s: 4, t: 0, v: 0 },
                { n: 'Skyr', c: 62, p: 11, s: 4, t: 0.2, v: 0 }
            ]
        };

        if (typeof BASE_MEAL_PLAN === 'undefined') {
            document.getElementById("scheduleGrid").innerHTML = `
                <div style="grid-column: 1 / -1; margin: 20px 0; padding: 40px; background: #fee2e2; border: 2px dashed #ef4444; border-radius: 12px; color: #b91c1c; text-align: left;">
                    <h2>⚠️ Chyba: Súbor <code>data.js</code> sa nenačítal!</h2>
                </div>
            `;
        } else {
            buildPools();
            initApp();
        }

        function buildPools() {
            Object.keys(BASE_MEAL_PLAN).forEach(dayKey => {
                let dayMeals = BASE_MEAL_PLAN[dayKey];
                if (!Array.isArray(dayMeals)) return; 
                dayMeals.forEach((meal, mIdx) => {
                    if (mIdx <= 4) pools[mIdx].push(JSON.parse(JSON.stringify(meal)));
                });
            });
        }

        function initApp() {
            updateLockUI();
            setInputsFromGoals();
            if (!chosenMealsTimeline || typeof chosenMealsTimeline[1] === 'undefined') {
                chosenMealsTimeline = {};
                generateEntireNewWeek(false); 
            }
            try { generateScaledPlan(); renderGrid(); updateAllDaySummaries(); saveCartData(); } 
            catch (err) { console.error("Chyba:", err); localStorage.clear(); location.reload(); }
        }

        function setInputsFromGoals() {
            document.getElementById("goal-cal").value = GOALS.cal;
            document.getElementById("goal-pro").value = GOALS.pro;
            document.getElementById("goal-carb").value = GOALS.carb;
            document.getElementById("goal-fat").value = GOALS.fat;
            document.getElementById("goal-fib").value = GOALS.fib;
        }

        // 1. NOVÝ NÁSTROJ: Inteligentný vyhľadávač najlepšej kombinácie pre daný deň
        function findBestComboForDay(day) {
            let bestCombo = [0, 0, 0, 0, 0];
            let bestDiff = Infinity;
            
            let originalTimeline = JSON.parse(JSON.stringify(chosenMealsTimeline));
            if (!chosenMealsTimeline[day]) chosenMealsTimeline[day] = [0,0,0,0,0];

            for(let i = 0; i < 500; i++) {
                let testCombo = [];
                for (let mIdx = 0; mIdx <= 4; mIdx++) {
                    testCombo.push(Math.floor(Math.random() * pools[mIdx].length));
                }
                
                chosenMealsTimeline[day] = testCombo;
                generateScaledPlan(); 
                
                let sums = { cal: 0, pro: 0, carb: 0, fat: 0, fib: 0 };
                currentMealPlan[day].forEach(meal => {
                    sums.cal += meal.cal; sums.pro += meal.pro; sums.carb += meal.carb; sums.fat += meal.fat; sums.fib += meal.fib;
                });
                
                // TU JE ZMENA: Výpočet chýb je v percentách (0.1 znamená 10% mimo cieľa). 
                // Tým pádom malá vláknina už nebude valcovaná veľkými kalóriami.
                let diff = 0;
                
                if (lockedGoals.cal && GOALS.cal) diff += Math.abs(sums.cal - GOALS.cal) / GOALS.cal;
                if (lockedGoals.pro && GOALS.pro) diff += Math.abs(sums.pro - GOALS.pro) / GOALS.pro;
                if (lockedGoals.carb && GOALS.carb) diff += Math.abs(sums.carb - GOALS.carb) / GOALS.carb;
                if (lockedGoals.fat && GOALS.fat) diff += Math.abs(sums.fat - GOALS.fat) / GOALS.fat;
                if (lockedGoals.fib && GOALS.fib) diff += Math.abs(sums.fib - GOALS.fib) / GOALS.fib;
                           
                if(diff < bestDiff) {
                    bestDiff = diff;
                    bestCombo = [...testCombo];
                }
            }
            
            chosenMealsTimeline = originalTimeline;
            return bestCombo;
        }

        // 2. VYLEPŠENÝ TÝŽDEŇ: Použije inteligentný výber pre každý deň
        function generateEntireNewWeek(shouldReloadPage = true) {
            chosenMealsTimeline = {};
            // Príprava prázdnych polí
            for (let day = 1; day <= 7; day++) chosenMealsTimeline[day] = [0,0,0,0,0];

            for (let day = 1; day <= 7; day++) {
                chosenMealsTimeline[day] = findBestComboForDay(day);
            }
            
            localStorage.setItem('chosenMealsTimeline', JSON.stringify(chosenMealsTimeline));
            
            mealStatuses = {};
            localStorage.setItem('mealStatuses', JSON.stringify(mealStatuses));

            if (shouldReloadPage) location.reload();
        }

        // 3. VYLEPŠENÝ DEŇ: Použije inteligentný výber len pre konkrétny deň
        function reloadWholeDay(day) {
            if(confirm(`Chceš inteligentne vygenerovať nové jedlá pre tento deň tak, aby čo najlepšie sadli do makier? (Apka vyskúša 100 kombinácií na pozadí)`)) {
                chosenMealsTimeline[day] = findBestComboForDay(day);
                
                // Premažeme staré odškrtnuté jedlá a vlastné suroviny pre tento deň
                for (let mIdx = 0; mIdx <= 4; mIdx++) {
                    delete mealStatuses[`d${day}_m${mIdx}`];
                    delete customFoods[`d${day}_m${mIdx}`];
                }
                
                localStorage.setItem('chosenMealsTimeline', JSON.stringify(chosenMealsTimeline));
                localStorage.setItem('mealStatuses', JSON.stringify(mealStatuses));
                localStorage.setItem('customFoods', JSON.stringify(customFoods));
                
                generateScaledPlan(); 
                renderGrid(); 
                updateAllDaySummaries();
                showToast("Deň bol inteligentne pregenerovaný 🧠");
            }
        }

        function updateGoal(type) {
            let val = parseInt(document.getElementById(`goal-${type}`).value);
            const MIN_VALUES = { cal: 1200, pro: 40, carb: 30, fat: 25, fib: 10 };
            
            if (val && val < MIN_VALUES[type]) {
                showToast(`Minimum pre toto makro je ${MIN_VALUES[type]}`);
                val = MIN_VALUES[type];
                document.getElementById(`goal-${type}`).value = val;
            }

            if (val) {
                GOALS[type] = val;
            } else {
                GOALS[type] = null; 
            }
            
            localStorage.setItem('userGoals', JSON.stringify(GOALS));
        }

        function generateScaledPlan() {
            currentMealPlan = {};
            let rCal = GOALS.cal / BASE_GOALS.cal || 1;
            // Ak je makro zamknuté, tvrdo držíme jeho cieľ. Ak je odomknuté, necháme mu prirodzený pomer podľa kalórií.
            let rPro = lockedGoals.pro ? (GOALS.pro / BASE_GOALS.pro || 1) : rCal;
            let rCarb = lockedGoals.carb ? (GOALS.carb / BASE_GOALS.carb || 1) : rCal;
            let rFat = lockedGoals.fat ? (GOALS.fat / BASE_GOALS.fat || 1) : rCal;

            for (let day = 1; day <= 7; day++) {
                currentMealPlan[day] = [];
                for (let mIdx = 0; mIdx <= 4; mIdx++) {
                    let poolIdx = chosenMealsTimeline[day][mIdx] || 0;
                    let mealBlueprint = pools[mIdx][poolIdx];
                    if(!mealBlueprint) continue;

                    let mealCopy = JSON.parse(JSON.stringify(mealBlueprint));
                    mealCopy.day = day; mealCopy.mIdx = mIdx;
                    
                    let cID = `d${day}_m${mIdx}`;
                    if (customFoods[cID]) mealCopy.ing = mealCopy.ing.concat(JSON.parse(JSON.stringify(customFoods[cID])).map(c=>({encode:true, isCustom:true, ...c})));

                    mealCopy.cal = 0; mealCopy.pro = 0; mealCopy.carb = 0; mealCopy.fat = 0; mealCopy.fib = 0;

                    mealCopy.ing.forEach((i, iIdx) => {
                        if(!i.isCustom) {
                            let swapKey = `d${day}_m${mIdx}_i${iIdx}`;
                            if (userSwaps[swapKey]) {
                                let sd = userSwaps[swapKey];
                                let newQtyGrams = i.cal > 0 ? (i.cal / sd.c) * 100 : 100; 
                                i.text = `${newQtyGrams.toFixed(1)} g ${sd.n}`;
                                i.pro = (newQtyGrams * sd.p / 100); i.carb = (newQtyGrams * sd.s / 100);
                                i.fat = (newQtyGrams * sd.t / 100); i.fib = (newQtyGrams * sd.v / 100);
                            }
                            let match = i.text.match(/^([0-9.,]+)\s*([a-zA-ZáčďéíľĺňóôŕšťúýžÁČĎÉÍĽĹŇÓÔŔŠŤÚÝŽ%\/]+)\s+(.+)$/);
                            let effectiveRatio = rCal; 
                            
                            if(match) {
                                let qty = parseFloat(match[1].replace(',', '.'));
                                let unit = match[2]; let name = match[3];
                                let cat = getCategory(name);
                                let specificRatio = (cat === '🥩 Mäso a Ryby' || cat === '🥛 Mliečne výrobky a Vajcia') ? rPro : (cat === '🍞 Prílohy a Pečivo' ? rCarb : (cat === '🥜 Tuky, Orechy a Semená' ? rFat : rCal));

                                let finalQty = Math.round(qty * specificRatio * 2) / 2;
                                if(finalQty===0 && qty>0) finalQty = 0.5;
                                effectiveRatio = qty > 0 ? (finalQty / qty) : 1;
                                i.text = `${finalQty} ${unit} ${name}`;
                            }
                            i.cal = Math.round(i.cal * effectiveRatio); i.pro = Math.round(i.pro * effectiveRatio);
                            i.carb = Math.round(i.carb * effectiveRatio); i.fat = Math.round(i.fat * effectiveRatio);
                            i.fib = Math.round(i.fib * effectiveRatio);
                        }
                        mealCopy.cal += i.cal; mealCopy.pro += i.pro; mealCopy.carb += i.carb; mealCopy.fat += i.fat; mealCopy.fib += i.fib;
                    });
                    currentMealPlan[day].push(mealCopy);
                }
            }
        }

        // Render Grid
        function renderGrid() {
            const grid = document.getElementById("scheduleGrid");
            grid.innerHTML = `
                <div class="col-header empty"></div>
                <div class="col-header">Raňajky</div>
                <div class="col-header">Desiata</div>
                <div class="col-header">Obed</div>
                <div class="col-header">Olovrant</div>
                <div class="col-header">Večera</div>
                <div class="col-header summary">Denný súčet 📊</div>
            `;
            const nazvyDni = ["Pondelok", "Utorok", "Streda", "Štvrtok", "Piatok", "Sobota", "Nedeľa"];
            
            // Logika pre zmenu poradia dní (pripnutý ide prvý)
            let displayDays = [1, 2, 3, 4, 5, 6, 7];
            if (pinnedDay && displayDays.includes(pinnedDay)) {
                displayDays = displayDays.filter(d => d !== pinnedDay);
                displayDays.unshift(pinnedDay);
            }

            // Vykreslenie dní v novom poradí
            displayDays.forEach(day => {
                let isPinned = (pinnedDay === day);
                let dayCell = document.createElement("div"); dayCell.className = "day-label-box";
                dayCell.innerHTML = `
                    <div class="day-label" style="text-align: center; margin-bottom: 6px;">
                        ${nazvyDni[day - 1]}
                    </div>
                    <div class="day-action-icons" style="justify-content: center; align-items: center;">
                        <button class="icon-btn-small" onclick="togglePinDay(${day}, ${!isPinned})" title="${isPinned ? 'Odopnúť' : 'Pripnúť na vrch'}" style="${isPinned ? 'border-color: #ef4444; background: #fef2f2; opacity: 1; filter: grayscale(0%);' : 'opacity: 0.6; filter: grayscale(100%);'} font-size: 1rem;">📌</button>
                        <button class="icon-btn-small" onclick="reloadWholeDay(${day})" title="Nové náhodné jedlá na celý deň">🔄</button>
                        <button class="icon-btn-small" onclick="addWholeDayToCart(${day})" title="Pridať celý deň do nákupu">🛒</button>
                    </div>`;
                grid.appendChild(dayCell);
                
                if (currentMealPlan[day]) {
                    currentMealPlan[day].forEach(meal => {
                        let cell = document.createElement("div"); 
                        cell.className = "meal-cell"; 
                        cell.id = `cell_d${meal.day}_m${meal.mIdx}`;
                        
                        // TU JE ZMENA: Akcia kliknutia sa pridáva priamo na celú bunku
                        cell.onclick = () => openMealModalByIDs(meal.day, meal.mIdx);
                        
                        let isEaten = mealStatuses[`d${meal.day}_m${meal.mIdx}`] === 'eaten';
                        cell.innerHTML = `
                            <input type="checkbox" title="Zjedol som" style="cursor: pointer; width: 22px; height: 22px; margin: 0; accent-color: #16a34a; position: absolute; bottom: 12px; left: 12px; z-index: 5;" ${isEaten ? 'checked' : ''} onclick="event.stopPropagation(); toggleMealEatenQuick(${meal.day}, ${meal.mIdx}, this.checked)">
                            <div class="meal-cell-top">
                                <div class="meal-cell-title">${escapeHTML(meal.title)}</div>
                                <div class="meal-cell-macros" style="line-height: 1.5; margin-top: 4px;">

        function openSearchModal(day, mIdx) {
            currentSearchDay = day; currentSearchMIdx = mIdx;

        function filterMeals() {
    let query = removeDiacritics(document.getElementById("searchInput").value.toLowerCase());
    let resultsDiv = document.getElementById("searchResults");
    resultsDiv.innerHTML = "";
    let pool = pools[currentSearchMIdx] || [];

    let resultsCount = 0; // Počítadlo úspešne načítaných jedál

    pool.forEach((meal, idx) => {
        try {
            // Ochrana pred chýbajúcimi dátami v data.js
            let mealTitle = meal.title || "Neznáme jedlo";
            let ingredients = Array.isArray(meal.ing) ? meal.ing : [];
            
            // Bezpečné spojenie textov pre vyhľadávanie
            let textToSearch = removeDiacritics((mealTitle + " " + ingredients.map(i => i.text || "").join(" ")).toLowerCase());
            
            if (textToSearch.includes(query)) {
                resultsCount++;
                let div = document.createElement("div"); 
                div.className = "search-result-item";
                
                // Bezpečné vyňatie názvov surovín
                let shortIng = ingredients.map(i => {
                    let text = i.text || "";
                    let parts = text.split(" ");
                    return parts.length >= 3 ? parts.slice(2).join(" ") : text;
                }).join(", ");

                if(!shortIng) shortIng = "Žiadne suroviny";

                // Rýchly výpočet celkových kalórií a bielkovín zo surovín
                let mealCal = 0;
                let mealPro = 0;
                ingredients.forEach(i => {
                    mealCal += (i.cal || 0);
                    mealPro += (i.pro || 0);
                });

                div.innerHTML = `<div class="search-result-title">${escapeHTML(mealTitle)}</div>
                                 <div class="search-result-meta">🔥 ${mealCal} kcal | 🥩 ${mealPro}g Pro | Suroviny: ${escapeHTML(shortIng)}</div>`;
                
                div.onclick = () => {
                    swapSpecificMeal(currentSearchDay, currentSearchMIdx, idx);
                    closeModal('searchModal');
                };
                resultsDiv.appendChild(div);
            }
        } catch (error) {
            // Ak má nejaké jedlo úplne zničenú štruktúru v data.js, preskočíme ho, ale kód nespadne
            console.error(`Chyba pri načítaní jedla č. ${idx}:`, error);
        }
    });

    // Vykreslenie správy podľa počtu výsledkov
    if (resultsCount === 0) {
        resultsDiv.innerHTML = "<p style='color:var(--text-muted); font-style:italic;'>Nenašli sa žiadne jedlá vyhovujúce vyhľadávaniu.</p>";
    } else {
        let countInfo = document.createElement("div");
        countInfo.style.cssText = "font-size: 0.85rem; color: var(--primary); font-weight: 600; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px;";
        countInfo.innerText = `Nájdených možností: ${resultsCount}`;
        resultsDiv.insertBefore(countInfo, resultsDiv.firstChild);
    }
}

        function updateAllDaySummaries() {
            function getStatusIcon(current, goal) {
                if (!goal) return "";
                let pct = (current / goal) * 100;
                
                // Hodnotenie presnosti úspechu
                if (pct >= 95 && pct <= 105) {
                    return `<span style="margin-left: 6px; font-weight: bold;">✅</span>`;
                } else if (pct > 105 && pct <= 110) {
                    return `<span style="color: #f97316; font-weight: bold; margin-left: 6px; font-size: 1.05rem;" title="Prekročené o 5 až 10%">❗</span>`;
                } else if (pct > 110 || pct < 95) {
                    return `<span style="color: #ef4444; font-weight: bold; margin-left: 6px; font-size: 1.15rem;" title="Mimo cieľ!">❗</span>`;
                }
                return "";
            }

            for (let day = 1; day <= 7; day++) {
                let sums = { cal: 0, pro: 0, carb: 0, fat: 0, fib: 0 }; // To, čo si reálne zjedol
                let planned = { cal: 0, pro: 0, carb: 0, fat: 0, fib: 0 }; // To, čo ti na dnes naplánoval algoritmus

                if (currentMealPlan[day]) {
                    currentMealPlan[day].forEach(meal => {
                        // Sčítame celkový denný plán od algoritmu
                        planned.cal += meal.cal; 
                        planned.pro += meal.pro; 
                        planned.carb += meal.carb; 
                        planned.fat += meal.fat; 
                        planned.fib += meal.fib;

                        // Sčítame len to, čo si odškrtol ako "Zjedol som"
                        if (mealStatuses[`d${day}_m${meal.mIdx}`] === 'eaten') {
                            sums.cal += meal.cal; sums.pro += meal.pro; sums.carb += meal.carb; sums.fat += meal.fat; sums.fib += meal.fib;
                        }
                    });
                }

                // DYNAMICKÉ CIELE: 
                // Ak je makro ZAMKNUTÉ, cieľom je prísna hodnota zhora (GOALS).
                // Ak je ODOMKNUTÉ, cieľom je to, čo ti na ten deň vypočítal algoritmus (planned).
                let tCal = lockedGoals.cal ? GOALS.cal : planned.cal;
                let tPro = lockedGoals.pro ? GOALS.pro : planned.pro;
                let tCarb = lockedGoals.carb ? GOALS.carb : planned.carb;
                let tFat = lockedGoals.fat ? GOALS.fat : planned.fat;
                let tFib = lockedGoals.fib ? GOALS.fib : planned.fib;

                let sCell = document.getElementById(`summary_d${day}`);
                if (sCell) {
                    sCell.innerHTML = `
                        <div class="summary-title">Spolu: ${sums.cal} / ${tCal} kcal</div>
                        <div class="macro-progress-text"><div class="mpt-fill" style="width:${Math.min((sums.cal/tCal)*100,100)}%; background:var(--primary-light);"></div><span class="mpt-label">🔥 Kcal</span><span class="mpt-value">${sums.cal}/${tCal}${getStatusIcon(sums.cal, tCal)}</span></div>
                        <div class="macro-progress-text"><div class="mpt-fill" style="width:${Math.min((sums.pro/tPro)*100,100)}%; background:var(--secondary-light);"></div><span class="mpt-label">🥩 Pro</span><span class="mpt-value">${sums.pro}/${tPro}g${getStatusIcon(sums.pro, tPro)}</span></div>
                        <div class="macro-progress-text"><div class="mpt-fill" style="width:${Math.min((sums.carb/tCarb)*100,100)}%; background:var(--blue-light);"></div><span class="mpt-label">🍞 Sac</span><span class="mpt-value">${sums.carb}/${tCarb}g${getStatusIcon(sums.carb, tCarb)}</span></div>
                        <div class="macro-progress-text"><div class="mpt-fill" style="width:${Math.min((sums.fat/tFat)*100,100)}%; background:var(--yellow-light);"></div><span class="mpt-label">🥑 Tuk</span><span class="mpt-value">${sums.fat}/${tFat}g${getStatusIcon(sums.fat, tFat)}</span></div>
                        <div class="macro-progress-text"><div class="mpt-fill" style="width:${Math.min((sums.fib/tFib)*100,100)}%; background:#e7e5e4;"></div><span class="mpt-label">🌾 Vlák</span><span class="mpt-value">${sums.fib}/${tFib}g${getStatusIcon(sums.fib, tFib)}</span></div>
                    `;
                }
            }
        }

        // --- NÁKUP ---
        function extractKeyFromText(text) {
            let match = text.match(/^([0-9.,]+)\s*([a-zA-ZáčďéíľĺňóôŕšťúýžÁČĎÉÍĽĹŇÓÔŔŠŤÚÝŽ%\/]+)\s+(.+)$/);
            let unit = "", name = text; if(match) { unit = match[2]; name = match[3]; }
            return name.toLowerCase() + "|" + unit;
        }

        function getCategory(name) {
            const lower = removeDiacritics(name.toLowerCase());
            
            // 🥩 Mäso a Ryby
            if (lower.match(/(kurac|bravc|hovadz|morc|losos|tuniak|tresk|makrel|pstruh|kapor|zubac|maso|prs|sunk|parky|morske plod)/)) return '🥩 Mäso a Ryby';
            
            // 🥛 Mliečne výrobky a Vajcia
            if (lower.match(/(jogurt|mliek|syr|tvaroh|vajc|masl|skyr|kefir|mozzarella|parmezan|cottage|bielk|zltk|acidofilne|encian)/)) return '🥛 Mliečne výrobky a Vajcia';
            
            // 🍞 Prílohy a Pečivo
            if (lower.match(/(vlock|chleb|toast|quino|sosovic|ryz|zemiak|batat|cestovin|bulgur|kuskus|tarhon|pohank|knackebrot|tortil|cicer|hummus|krupic|muc|muka|zeml|rozok|pecivo)/)) return '🍞 Prílohy a Pečivo';
            
            // 🥦 Ovocie a Zelenina
            if (lower.match(/(jablk|cucoried|brokolic|paradajk|rukol|banan|hrusk|spenat|mrkv|kapust|malin|pomaranc|baklazan|jahod|uhork|fazul|kukuric|sampinon|hrasok|oliv|cibul|cesnak|fig|cuket|paprik|salat|zelenin|brosk|marhu|sliv|hrozn|melon|nektarink|kiwi|grep|ananas|spargl|zeler)/)) return '🥦 Ovocie a Zelenina';
            
            // 🥜 Tuky, Orechy a Semená
            if (lower.match(/(chia|mandl|olej|orech|arasid|lanov|tekvic|semien|kesu|lieskov|sezam|pistac|kokos|mast|pekan)/)) return '🥜 Tuky, Orechy a Semená';
            
            // 🍫 Ostatné (kakao, proteín, atď.)
            return '🛒 Ostatné';
        }

        function getAggregatedCart() {
            let cartObj = {};
            shoppingList.forEach(id => {
                let parts = id.match(/d(\d+)_m(\d+)_i(\d+)/);
                if(parts && currentMealPlan[parts[1]][parts[2]].ing[parts[3]]) {
                    let rawStr = currentMealPlan[parts[1]][parts[2]].ing[parts[3]].text; 
                    let match = rawStr.match(/^([0-9.,]+)\s*([a-zA-ZáčďéíľĺňóôŕšťúýžÁČĎÉÍĽĹŇÓÔŔŠŤÚÝŽ%\/]+)\s+(.+)$/);
                    let qty = 1, unit = "", name = rawStr;
                    if(match) { qty = parseFloat(match[1].replace(',', '.')); unit = match[2]; name = match[3]; }
                    let key = name.toLowerCase() + "|" + unit;
                    if(!cartObj[key]) cartObj[key] = { qty: 0, unit: unit, name: name };
                    cartObj[key].qty += qty;
                }
            });
            return cartObj;
        }

        function createCartItemHTML(key, item, isPurchased) {
            let displayString = item.unit ? `${+(item.qty).toFixed(1)} ${item.unit} ${item.name}` : `${item.name}`;
            let isChecked = isPurchased ? "checked" : ""; let textStyle = isPurchased ? "text-decoration: line-through; opacity: 0.5;" : "";
            return `<li style="padding:10px 0;"><label class="checkbox-wrapper"><input type="checkbox" onchange="togglePurchased('${key}', this.checked)" ${isChecked}><div class="checkmark"></div><span class="ingredient-text" style="margin-top:2px; ${textStyle}">${escapeHTML(displayString)}</span></label></li>`;
        }

        function getUnitWeight(unit) {
            if (!unit) return 2;
            let u = unit.toLowerCase();
            // Najprv chceme vážené a merané suroviny (g, kg, ml, l), potom kusové
            if (['g', 'kg', 'ml', 'l', 'dkg'].includes(u)) return 1;
            return 2;
        }

        function getCategoryWeight(cat) {
            // Tvoje vlastné poradie kategórií
            if (cat === '🥩 Mäso a Ryby') return 1;
            if (cat === '🥛 Mliečne výrobky a Vajcia') return 2;
            if (cat === '🍞 Prílohy a Pečivo') return 3;
            if (cat === '🥦 Ovocie a Zelenina') return 4;
            if (cat === '🥜 Tuky, Orechy a Semená') return 5;
            return 6; // Ostatné
        }

        function openCart() {
            let cartContent = document.getElementById("cartContent"); 
            let aggregated = getAggregatedCart(); 
            let keys = Object.keys(aggregated);
            
            if (keys.length === 0) {
                cartContent.innerHTML = "<p class='empty-cart-msg'>Zoznam je prázdny. Vyber si suroviny alebo pridaj celé dni.</p>";
                document.getElementById("cartModal").classList.add("active"); 
                return;
            }
            
            let sortMethod = document.getElementById("cartSort").value; 
            let sortDir = document.getElementById("cartSortDir").value; 
            let dirMultiplier = sortDir === "desc" ? -1 : 1; 

            let unpurchased = keys.filter(k => !purchasedList.includes(k)); 
            let purchased = keys.filter(k => purchasedList.includes(k));

            const sortLogic = (a, b) => {
                let itemA = aggregated[a]; 
                let itemB = aggregated[b];
                let result = 0;
                
                let cleanNameA = removeDiacritics(itemA.name.trim().toLowerCase());
                let cleanNameB = removeDiacritics(itemB.name.trim().toLowerCase());

                if (sortMethod === "qty") {
                    let weightA = getUnitWeight(itemA.unit);
                    let weightB = getUnitWeight(itemB.unit);
                    
                    if (weightA !== weightB) return weightA - weightB; 
                    
                    result = itemA.qty - itemB.qty;
                    if (result === 0) {
                        let nameOnlyA = itemA.name.replace(/^[0-9.,\s]+/i, "").trim();
                        let nameOnlyB = itemB.name.replace(/^[0-9.,\s]+/i, "").trim();
                        result = removeDiacritics(nameOnlyA.toLowerCase()).localeCompare(removeDiacritics(nameOnlyB.toLowerCase()));
                    }
                } 
                else if (sortMethod === "cat") {
                    let catA = getCategory(itemA.name);
                    let catB = getCategory(itemB.name);
                    
                    if (catA === catB) {
                        let nameOnlyA = itemA.name.replace(/^[0-9.,\s]+/i, "").trim();
                        let nameOnlyB = itemB.name.replace(/^[0-9.,\s]+/i, "").trim();
                        result = removeDiacritics(nameOnlyA.toLowerCase()).localeCompare(removeDiacritics(nameOnlyB.toLowerCase()));
                    } else {
                        result = getCategoryWeight(catA) - getCategoryWeight(catB);
                    }
                } 
                else { 
                    let nameOnlyA = itemA.name.replace(/^[0-9.,\s]+/i, "").trim();
                    let nameOnlyB = itemB.name.replace(/^[0-9.,\s]+/i, "").trim();
                    result = removeDiacritics(nameOnlyA.toLowerCase()).localeCompare(removeDiacritics(nameOnlyB.toLowerCase())); 
                }

                return result * dirMultiplier;
            };

            unpurchased.sort(sortLogic);
            purchased.sort(sortLogic);

            let listHTML = "";
            
            if (sortMethod === "cat") {
                let categories = {}; 
                unpurchased.forEach(k => { 
                    let cat = getCategory(aggregated[k].name); 
                    if (!categories[cat]) categories[cat] = []; 
                    categories[cat].push(k); 
                });
                
                // Zoraďovanie blokov kategórií podľa tvojej logiky
                Object.keys(categories).sort((a,b) => (getCategoryWeight(a) - getCategoryWeight(b)) * dirMultiplier).forEach(cat => {
                    listHTML += `<h4 style="margin-top:15px; border-bottom:1px solid #d6d3d1; padding-bottom:5px; color: var(--text-main); font-size: 0.95rem;">${cat}</h4><ul class='ingredients' style='margin-bottom:0;'>`;
                    categories[cat].forEach(key => listHTML += createCartItemHTML(key, aggregated[key], false)); 
                    listHTML += `</ul>`;
                });
            } else {
                listHTML += "<ul class='ingredients' style='margin-bottom:0;'>"; 
                unpurchased.forEach(key => listHTML += createCartItemHTML(key, aggregated[key], false)); 
                listHTML += "</ul>";
            }
            
            if (purchased.length > 0) {
                listHTML += `<h4 style="margin-top:25px; border-bottom:1px solid #d6d3d1; padding-bottom:5px; color: var(--text-muted); font-size: 0.95rem;">✔️ Zakúpené</h4><ul class='ingredients' style='margin-bottom:0;'>`;
                purchased.forEach(key => listHTML += createCartItemHTML(key, aggregated[key], true)); 
                listHTML += "</ul>";
            }
            
            cartContent.innerHTML = listHTML; 
            document.getElementById("cartModal").classList.add("active");
        }

        function clearCart() {
            if(confirm("Naozaj vymazať celý zoznam?")) {
                shoppingList = []; purchasedList = []; saveCartData(); closeModal('cartModal');
                document.querySelectorAll('.checkbox-wrapper input[type="checkbox"]').forEach(cb => cb.checked = false);
                if(document.getElementById("mealModal").classList.contains("active")) openMealModal(currentMealPlan[currentMealDay][currentMealIdx]);
            }
        }

        function closeModal(modalId) { document.getElementById(modalId).classList.remove("active"); }

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) { if(e.target === this) this.classList.remove("active"); });
        });

        function swapIngredient(day, mIdx, iIdx, name) {
            let n = name.toLowerCase(); let group = null;
            if (n.match(/(losos|makrel|pstruh).*úden|úden.*(losos|makrel|pstruh)/)) group = 'ryby_udene';
            else if (n.match(/(losos|tresk|tuniak|zubáč|kapor)/)) group = 'ryby';
            else if (n.match(/(kurac|morčac)/)) group = 'hydina';
            else if (n.match(/(jablk|banán|hrušk|čučoried|jahôd|malin|fig|mang|brosky|pomaranč|slivk)/)) group = 'ovocie';
            else if (n.match(/(ryž|zemiak|batat|cestovin|kuskus|bulgur|pohánk|quino)/)) group = 'prilohy';
            else if (n.match(/(vločk)/)) group = 'vlocky';
            else if (n.match(/(orech|mandl|kešu|arašid|lieskov)/)) group = 'orechy';
            else if (n.match(/(brokolic|karfiol|mrkv|cuket|paradaj|uhork|paprik|šalát|špenát)/)) group = 'zelenina';
            else if (n.match(/(tvaroh|skyr|gréck.*jogurt)/)) group = 'mliecne_huste';

            if (!group) return alert("Pre túto konkrétnu surovinu zatiaľ nemáme v databáze vhodnú alternatívu.");
            
            let options = SWAP_DB[group]; let validOptions = options.filter(opt => !name.toLowerCase().includes(opt.n.toLowerCase()));
            if (validOptions.length === 0) validOptions = options;
            userSwaps[`d${day}_m${mIdx}_i${iIdx}`] = validOptions[Math.floor(Math.random() * validOptions.length)];
            localStorage.setItem('userSwaps', JSON.stringify(userSwaps));
            generateScaledPlan(); renderGrid(); updateAllDaySummaries(); openMealModal(currentMealPlan[day][mIdx]);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW chyba:', err)); });
        }

function resetMealIngredients() {
            let hasChanges = false;
            
            // Prejdeme všetky uložené zámeny surovín
            Object.keys(userSwaps).forEach(key => {
                // Ak nájdeme zámenu, ktorá patrí k aktuálne otvorenému jedlu
                if (key.startsWith(`d${currentMealDay}_m${currentMealIdx}_i`)) {
                    delete userSwaps[key]; // Vymažeme ju
                    hasChanges = true;
                }
            });

            if (hasChanges) {
                // Uložíme čistý stav, prepočítame a znovu otvoríme okno
                localStorage.setItem('userSwaps', JSON.stringify(userSwaps));
                generateScaledPlan(); 
                renderGrid(); 
                updateAllDaySummaries(); 
                openMealModal(currentMealPlan[currentMealDay][currentMealIdx]);
                showToast("Suroviny boli vrátené do pôvodného stavu 🔄");
            } else {
                showToast("Toto jedlo nemá žiadne zmenené suroviny ℹ️");
            }
        }
    </script>
